<script>
  // ====== CONFIG ======
  const CLICK_WEBAPP = "https://script.google.com/macros/s/AKfycbwbvehBfJXJ3ankDdxmaeyrNyUxF4mMSdHwYiL0h7Wce-hN-UCC_D1xAdeuZQTT2S4S/exec";
  const KEY = "dor2026grow";
  const GROW_PAY_URL = "https://pay.grow.link/f08e9f6bc0b22c930b700b0d98b64085-Mjg1MDI3Nw";
  // ====================

  function qp(name){
    try {
      const u = new URL(window.location.href);
      return (u.searchParams.get(name) || "").trim();
    } catch(e) {
      return "";
    }
  }

  function getStored(key){
    try { return (localStorage.getItem(key) || "").trim(); } catch(e){ return ""; }
  }

  function setStored(key, val){
    try { if(val) localStorage.setItem(key, val); } catch(e){}
  }

  // 1) שמירת מזהים מה-URL
  (function storeClickIds(){
    const gclid  = qp("gclid");
    const wbraid = qp("wbraid");
    const gbraid = qp("gbraid");

    if (gclid)  setStored("gclid", gclid);
    if (wbraid) setStored("wbraid", wbraid);
    if (gbraid) setStored("gbraid", gbraid);
  })();

  // 2) שליחת קליק ל-Clicks (אמין)
  (function logClickToSheet(){
    if (!CLICK_WEBAPP || CLICK_WEBAPP.indexOf("http") !== 0) return;

    const gclid  = qp("gclid")  || getStored("gclid");
    const wbraid = qp("wbraid") || getStored("wbraid");
    const gbraid = qp("gbraid") || getStored("gbraid");

    // אם אין מזהים — לא שולחים
    if (!gclid && !wbraid && !gbraid) return;

    const ua = (navigator.userAgent || "").slice(0,120);

    const params = new URLSearchParams({
      mode: "click",
      key: KEY,
      gclid: gclid,
      wbraid: wbraid,
      gbraid: gbraid,
      landing: "github",
      src: "google",
      ua: ua
    });

    const url = CLICK_WEBAPP + "?" + params.toString();

    // הכי אמין
    try {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(url);
      } else {
        const img = new Image();
        img.src = url;
      }
    } catch(e) {
      console.warn("click log failed", e);
    }
  })();

  // 3) מעבר לתשלום
  function goDonate(){
    const gclid  = getStored("gclid");
    const wbraid = getStored("wbraid");
    const gbraid = getStored("gbraid");

    const u = new URL(GROW_PAY_URL);

    if (gclid)  u.searchParams.set("gclid", gclid);
    if (wbraid) u.searchParams.set("wbraid", wbraid);
    if (gbraid) u.searchParams.set("gbraid", gbraid);

    window.location.href = u.toString();
  }
</script>
